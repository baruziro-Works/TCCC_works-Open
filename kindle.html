<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle E-Ink Dashboard</title>
    <style>
        /* E-ink用に最適化された超高コントラスト・モノクロスタイル */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --card-bg: #ffffff;
        }

        /* ダークモード（反転モード） */
        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
            --border-color: #ffffff;
            --card-bg: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            -webkit-font-smoothing: none; /* E-inkでのボールド感を強調 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: background-color 0.1s, color 0.1s;
        }

        /* 強制90度回転モード時のCSS */
        body.rotate-screen {
            width: 100vh !important;
            height: 100vw !important;
            transform: rotate(90deg);
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 100vw;
            overflow: hidden;
        }

        /* ヘッダーエリア */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .date-container {
            display: flex;
            flex-direction: column;
        }

        #date {
            font-size: 1.4rem;
            font-weight: 900;
        }

        #day {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* コントロールボタン群 */
        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn:active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* メインレイアウト（縦・横対応のレスポンシブ） */
        main {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0;
            flex-direction: row; /* デフォルトは横向きに適した2カラム */
        }

        /* もし縦長画面（Kindleを縦に持っている状態かつ回転機能OFF）の場合は縦並びにする */
        @media (orientation: portrait) {
            body:not(.rotate-screen) main {
                flex-direction: column;
            }
            body:not(.rotate-screen) .left-col, 
            body:not(.rotate-screen) .right-col {
                flex: 1;
                width: 100%;
            }
        }

        .left-col {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 特大の時計エリア */
        .clock-card {
            border: 4px solid var(--border-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--card-bg);
            flex: 1.2;
            min-height: 120px;
        }

        #time {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* 天気カード */
        .weather-card {
            border: 4px solid var(--border-color);
            padding: 12px;
            background-color: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .weather-title {
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .weather-current {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .weather-icon-large {
            width: 56px;
            height: 56px;
            fill: var(--text-color);
        }

        .weather-info-main {
            text-align: right;
        }

        .temp-now {
            font-size: 2.2rem;
            font-weight: 900;
        }

        .weather-desc {
            font-size: 1rem;
            font-weight: bold;
        }

        /* 3日間予報 */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border-top: 2px dashed var(--border-color);
            padding-top: 8px;
        }

        .forecast-day {
            text-align: center;
            font-size: 0.8rem;
        }

        .forecast-date {
            font-weight: bold;
            margin-bottom: 2px;
        }

        .forecast-icon {
            width: 22px;
            height: 22px;
            fill: var(--text-color);
            margin: 3px auto;
        }

        .forecast-temp {
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* ToDo / メモカード */
        .memo-card {
            border: 4px solid var(--border-color);
            padding: 12px;
            background-color: var(--card-bg);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .memo-title {
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        #memo-area {
            width: 100%;
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        /* 全画面リフレッシュ用フラッシュオーバーレイ（焼き付き防止） */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: none;
        }

        /* マイルドなリフレッシュ用のアニメーションに改善 */
        @keyframes pulse-flash {
            0% { background-color: #000000; }
            50% { background-color: #ffffff; }
            100% { background-color: transparent; }
        }

        /* ステータスバー */
        footer {
            margin-top: 10px;
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.7;
            border-top: 1px solid var(--border-color);
            padding-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        /* 【新ハック】スリープ防止用：画面右下に1pxの極小ドットを配置し、CSSアニメーションで常に再描画を発生させる */
        .keep-awake-dot {
            position: fixed;
            bottom: 2px;
            right: 2px;
            width: 2px;
            height: 2px;
            background-color: var(--text-color);
            border-radius: 50%;
            animation: keepawake 1s infinite alternate;
            opacity: 0.1; /* ほとんど目立たないように設定 */
            z-index: 10000;
        }

        @keyframes keepawake {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.5); opacity: 0.8; }
        }

        /* 設定モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            z-index: 1000;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 6px;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 15px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- スリープ防止用のマイクロ・アニメーション・ドット -->
    <div class="keep-awake-dot"></div>

    <!-- 焼き付き防止用のフラッシュオーバーレイ -->
    <div id="flash-overlay" class="flash-overlay"></div>

    <!-- ヘッダー -->
    <header>
        <div class="date-container">
            <span id="date">2026年07月14日</span>
            <span id="day">火曜日</span>
        </div>
        <div class="controls">
            <button class="btn" onclick="toggleRotation()">回転</button>
            <button class="btn" onclick="toggleDarkMode()">反転</button>
            <button class="btn" onclick="openSettings()">設定</button>
            <button class="btn" onclick="triggerAntiGhosting()">更新</button>
        </div>
    </header>

    <!-- メイン -->
    <main>
        <!-- 左カラム：時計と天気 -->
        <div class="left-col">
            <!-- 時計 -->
            <div class="clock-card">
                <div id="time">20:52</div>
            </div>

            <!-- 天気予報 -->
            <div class="weather-card">
                <div class="weather-title">
                    <span id="location-name">天気予報 (豊川)</span>
                    <span style="font-size: 0.75rem; font-weight: normal;" id="weather-update-time">--:-- 更新</span>
                </div>
                <div class="weather-current">
                    <div id="weather-icon-container">
                        <svg class="weather-icon-large" viewBox="0 0 24 24" id="current-weather-icon">
                            <path d="M 12, 7.5 A 4.5,4.5 0 1,1 11.99,7.5 M 12, 1.5 A 1.5,1.5 0 1,1 11.99,1.5 M 12, 21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 2.5, 12 A 1.5,1.5 0 1,1 2.49,12 M 21.5, 12 A 1.5,1.5 0 1,1 21.49,12 M 18.7, 5.3 A 1.5,1.5 0 1,1 18.69,5.3 M 5.3, 5.3 A 1.5,1.5 0 1,1 5.29,5.3 M 18.7, 18.7 A 1.5,1.5 0 1,1 18.69,18.7 M 5.3, 18.7 A 1.5,1.5 0 1,1 5.29,18.7" />
                        </svg>
                    </div>
                    <div class="weather-info-main">
                        <div class="temp-now" id="temp-now">--°C</div>
                        <div class="weather-desc" id="weather-desc">読込中...</div>
                    </div>
                </div>

                <!-- 3日間予報 -->
                <div class="forecast-grid" id="forecast-grid">
                    <div class="forecast-day">
                        <div class="forecast-date">明日</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                    <div class="forecast-day">
                        <div class="forecast-date">明後日</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                    <div class="forecast-day">
                        <div class="forecast-date">3日後</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右カラム：ToDoメモ -->
        <div class="right-col">
            <div class="memo-card">
                <div class="memo-title">ToDo / 今日のメモ</div>
                <textarea id="memo-area" placeholder="ここにタスクやメモを入力（自動保存されます）..."></textarea>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer>
        <span id="auto-reload-status">自動スリープ防止: 待機中</span>
        <span>自動反転リフレッシュ: 毎正時</span>
    </footer>

    <!-- 設定モーダル -->
    <div class="overlay" id="overlay" onclick="closeSettings()"></div>
    <div class="modal" id="settings-modal">
        <div class="modal-title">ダッシュボード設定</div>
        <div class="form-group">
            <label for="input-lat">緯度 (Latitude):</label>
            <input type="number" id="input-lat" class="form-control" step="0.0001" value="34.8247">
        </div>
        <div class="form-group">
            <label for="input-lon">経度 (Longitude):</label>
            <input type="number" id="input-lon" class="form-control" step="0.0001" value="137.3776">
            <small style="display: block; margin-top: 4px; opacity: 0.8;">※初期値は愛知県豊川市です。</small>
        </div>
        <div class="form-group">
            <label for="input-name">地域名表示:</label>
            <input type="text" id="input-name" class="form-control" value="豊川">
        </div>
        <div class="modal-buttons">
            <button class="btn" onclick="closeSettings()">キャンセル</button>
            <button class="btn" onclick="saveSettings()">保存</button>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let config = {
            lat: 34.8247, // 初期値：豊川市
            lon: 137.3776,
            name: "豊川",
            darkMode: false,
            rotated: false
        };

        // スリープ回避用リロード管理用変数
        let lastReloadTime = Date.now();
        
        // 【最適化】Kindleのスリープ最大時間（1時間）の恩恵をフルに受けるため、
        // 余裕をもって「50分（3,000,000ミリ秒）」間隔に設定。
        // ※3分ごとの目障りなパタパタをなくし、50分に一度だけURL遷移を発生させてスリープを永久に引き伸ばします。
        const RELOAD_INTERVAL_MS = 50 * 60 * 1000; 
        
        let isMemoFocused = false; // メモ入力中かどうかのフラグ

        // 【E-ink超最適化デザイン】細い線や傾斜描画による歪みを防ぐための極太・シンプルSVGパス
        const SVG_PATHS = {
            sunny: "M 12, 7.5 A 4.5,4.5 0 1,1 11.99,7.5 M 12, 1.5 A 1.5,1.5 0 1,1 11.99,1.5 M 12, 21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 2.5, 12 A 1.5,1.5 0 1,1 2.49,12 M 21.5, 12 A 1.5,1.5 0 1,1 21.49,12 M 18.7, 5.3 A 1.5,1.5 0 1,1 18.69,5.3 M 5.3, 5.3 A 1.5,1.5 0 1,1 5.29,5.3 M 18.7, 18.7 A 1.5,1.5 0 1,1 18.69,18.7 M 5.3, 18.7 A 1.5,1.5 0 1,1 5.29,18.7",
            cloudy: "M19.35,10.04C18.67,6.59 15.64,4 12,4C9.11,4 6.6,5.64 5.35,8.04C2.34,8.36 0,10.91 0,14C0,17.31 2.69,20 6,20H19C21.76,20 24,17.76 24,15C24,12.36 21.95,10.22 19.35,10.04Z",
            rainy: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 6,20 H 8 V 23 H 6 Z M 11,20 H 13 V 23 H 11 Z M 16,20 H 18 V 23 H 16 Z",
            snowy: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 7,21.5 A 1.5,1.5 0 1,1 6.99,21.5 M 12,21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 17,21.5 A 1.5,1.5 0 1,1 16.99,21.5",
            thunderstorm: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 13,17 L 9,21 H 12 L 11,24 L 15,20 H 12 Z"
        };

        const WEATHER_CODE_MAP = {
            0: { desc: "晴れ", icon: "sunny" },
            1: { desc: "ほぼ晴れ", icon: "sunny" },
            2: { desc: "晴れ時々曇り", icon: "cloudy" },
            3: { desc: "曇り", icon: "cloudy" },
            45: { desc: "霧", icon: "cloudy" },
            48: { desc: "霧", icon: "cloudy" },
            51: { desc: "小雨", icon: "rainy" },
            53: { desc: "小雨", icon: "rainy" },
            55: { desc: "小雨", icon: "rainy" },
            61: { desc: "雨", icon: "rainy" },
            63: { desc: "雨", icon: "rainy" },
            65: { desc: "大雨", icon: "rainy" },
            71: { desc: "小雪", icon: "snowy" },
            73: { desc: "雪", icon: "snowy" },
            75: { desc: "大雪", icon: "snowy" },
            77: { desc: "あられ", icon: "snowy" },
            80: { desc: "にわか雨", icon: "rainy" },
            81: { desc: "にわか雨", icon: "rainy" },
            82: { desc: "激しいにわか雨", icon: "rainy" },
            85: { desc: "にわか雪", icon: "snowy" },
            86: { desc: "にわか雪", icon: "snowy" },
            95: { desc: "雷雨", icon: "thunderstorm" },
            96: { desc: "雷雨", icon: "thunderstorm" },
            99: { desc: "雷雨", icon: "thunderstorm" }
        };

        // --- 初期化 ---
        window.onload = function() {
            loadConfig();
            initClock();
            initMemo();
            fetchWeather();
        };

        // --- 設定保存と読み込み ---
        function loadConfig() {
            const saved = localStorage.getItem('kindle_dash_config');
            if (saved) {
                try {
                    config = JSON.parse(saved);
                    if (config.darkMode) {
                        document.body.classList.add('dark-mode');
                    }
                    if (config.rotated) {
                        document.body.classList.add('rotate-screen');
                    }
                } catch(e) {
                    console.error("設定読み込み失敗", e);
                }
            }
            document.getElementById('location-name').textContent = `天気予報 (${config.name})`;
        }

        function saveSettings() {
            config.lat = parseFloat(document.getElementById('input-lat').value) || 34.8247;
            config.lon = parseFloat(document.getElementById('input-lon').value) || 137.3776;
            config.name = document.getElementById('input-name').value || "登録地";
            
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
            closeSettings();
            
            document.getElementById('location-name').textContent = `天気予報 (${config.name})`;
            fetchWeather();
        }

        function openSettings() {
            document.getElementById('input-lat').value = config.lat;
            document.getElementById('input-lon').value = config.lon;
            document.getElementById('input-name').value = config.name;
            
            document.getElementById('settings-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // --- 時計 & 日付 & 各種スケジュール監視 ---
        function initClock() {
            const days = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];
            
            function update() {
                const now = new Date();
                
                // 強制的に日本時間（JST = UTC+9）に補正して取得
                const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                const jstNow = new Date(utc + 32400000); 
                
                const hours = String(jstNow.getHours()).padStart(2, '0');
                const minutes = String(jstNow.getMinutes()).padStart(2, '0');
                const seconds = String(jstNow.getSeconds()).padStart(2, '0');
                
                // 時間表示の更新
                document.getElementById('time').textContent = `${hours}:${minutes}`;
                
                // 日付表示の更新
                const yyyy = jstNow.getFullYear();
                const mm = String(jstNow.getMonth() + 1).padStart(2, '0');
                const dd = String(jstNow.getDate()).padStart(2, '0');
                document.getElementById('date').textContent = `${yyyy}年${mm}月${dd}日`;
                document.getElementById('day').textContent = days[jstNow.getDay()];

                // 毎正時(00分00秒)の瞬間に「完全に1回だけ」マイルドにリフレッシュ
                if (minutes === "00" && seconds === "00") {
                    triggerAntiGhosting();
                }

                // --- 【新ハック対応】スリープ回避タイマー（1秒ごとに監視） ---
                if (!isMemoFocused) {
                    const elapsed = Date.now() - lastReloadTime;
                    const remainingSec = Math.max(0, Math.ceil((RELOAD_INTERVAL_MS - elapsed) / 1000));
                    
                    const min = Math.floor(remainingSec / 60);
                    const sec = remainingSec % 60;
                    document.getElementById('auto-reload-status').textContent = `スリープ防止まで: ${min}分${sec}秒`;

                    // 強制遷移の5秒前に「画面をダミー操作」
                    if (remainingSec === 5) {
                        simulateUserActivity();
                    }

                    // 指定時間（50分）経過したら強制「新規ページ遷移」
                    if (elapsed >= RELOAD_INTERVAL_MS) {
                        triggerForceNavigation();
                    }
                } else {
                    document.getElementById('auto-reload-status').textContent = "メモ入力中：スリープ防止一時停止";
                }
            }
            
            update();
            setInterval(update, 1000); // 1秒ごとに現在時刻・スリープタイマーを厳密チェック
        }

        // --- ToDoメモ ---
        function initMemo() {
            const memoArea = document.getElementById('memo-area');
            const savedMemo = localStorage.getItem('kindle_dash_memo');
            if (savedMemo) {
                memoArea.value = savedMemo;
            }
            
            // 入力毎に自動保存
            memoArea.addEventListener('input', function() {
                localStorage.setItem('kindle_dash_memo', memoArea.value);
            });

            // メモ入力中はリロードさせないフラグを立てる
            memoArea.addEventListener('focus', function() {
                isMemoFocused = true;
            });

            memoArea.addEventListener('blur', function() {
                isMemoFocused = false;
                lastReloadTime = Date.now(); // フォーカスが外れたらそこから再度カウントダウン
            });
        }

        // --- 【新規】ブラウザへの疑似操作シミュレーション ---
        function simulateUserActivity() {
            try {
                window.scrollBy(0, 1);
                setTimeout(function() {
                    window.scrollBy(0, -1);
                }, 100);
            } catch(e) {
                console.log(e);
            }
        }

        // --- 【新ハック】URLを変更して新規ページとしてアクセスし直す ---
        function triggerForceNavigation() {
            // パラメータを取り除いた基本のURLを取得
            const currentUrl = window.location.href.split('?')[0];
            // 末尾に毎回必ず異なる「ユニークな数値（時間ミリ秒）」をパラメータとして付与します。
            // これによりKindleのブラウザは「全く新しいWebサイトを開いた」と認識し、
            // キャッシュではなく完全な新規通信ログを発生させて、OS側のスリープ判定を確実にリセットします。
            const uniqueUrl = currentUrl + "?t=" + Date.now();
            window.location.replace(uniqueUrl);
        }

        // --- 天気情報の取得 (Open-Meteo API) ---
        function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            updateWeatherData(data);
                        } catch(e) {
                            document.getElementById('weather-desc').textContent = "データ解析エラー";
                        }
                    } else {
                        document.getElementById('weather-desc').textContent = "通信エラー";
                    }
                }
            };
            xhr.send();
        }

        function updateWeatherData(data) {
            // 現時点の天気
            const current = data.current_weather;
            const currentCode = current.weathercode;
            const currentTemp = Math.round(current.temperature);
            
            const weatherInfo = WEATHER_CODE_MAP[currentCode] || { desc: "不明", icon: "sunny" };
            
            document.getElementById('temp-now').textContent = `${currentTemp}°C`;
            document.getElementById('weather-desc').textContent = weatherInfo.desc;
            
            // アイコン変更
            const iconSvg = document.getElementById('current-weather-icon');
            const pathData = SVG_PATHS[weatherInfo.icon] || SVG_PATHS.sunny;
            iconSvg.innerHTML = `<path d="${pathData}" />`;

            // 更新時刻（日本時間に補正）
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const jstNow = new Date(utc + 32400000);
            const timeStr = String(jstNow.getHours()).padStart(2, '0') + ":" + String(jstNow.getMinutes()).padStart(2, '0');
            document.getElementById('weather-update-time').textContent = `${timeStr} 更新`;

            // 3日間予報の描画
            const daily = data.daily;
            const forecastGrid = document.getElementById('forecast-grid');
            forecastGrid.innerHTML = ''; // クリア

            // 明日、明後日、3日後のループ
            for (let i = 1; i <= 3; i++) {
                const dateObj = new Date(daily.time[i]);
                const dayLabels = ["日", "月", "火", "水", "木", "金", "土"];
                const label = `${dateObj.getMonth() + 1}/${dateObj.getDate()}(${dayLabels[dateObj.getDay()]})`;
                
                const code = daily.weathercode[i];
                const info = WEATHER_CODE_MAP[code] || { desc: "不明", icon: "sunny" };
                const pData = SVG_PATHS[info.icon] || SVG_PATHS.sunny;
                
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);

                const forecastHtml = `
                    <div class="forecast-day">
                        <div class="forecast-date">${label}</div>
                        <svg class="forecast-icon" viewBox="0 0 24 24">
                            <path d="${pData}" />
                        </svg>
                        <div class="forecast-temp">${maxTemp}/${minTemp}°C</div>
                    </div>
                `;
                forecastGrid.insertAdjacentHTML('beforeend', forecastHtml);
            }
        }

        // --- 残像クリア機能 (Anti-Ghosting) ---
        function triggerAntiGhosting() {
            const overlay = document.getElementById('flash-overlay');
            overlay.style.display = 'block';
            overlay.style.animation = 'pulse-flash 0.8s ease-in-out 1'; 
            
            setTimeout(function() {
                overlay.style.display = 'none';
                overlay.style.animation = '';
            }, 800);
        }

        // --- 白黒反転モードトグル ---
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            config.darkMode = isDark;
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
        }

        // --- 画面の強制90度回転トグル ---
        function toggleRotation() {
            const isRotated = document.body.classList.toggle('rotate-screen');
            config.rotated = isRotated;
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
            
            // 焼き付き防止リフレッシュを実行して描画を安定させる
            triggerAntiGhosting();
        }
    </script>
</body>
</html>
