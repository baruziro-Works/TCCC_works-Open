<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kindle E-Ink Dashboard</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --card-bg: #ffffff;
        }

        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
            --border-color: #ffffff;
            --card-bg: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            -webkit-font-smoothing: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: background-color 0.1s, color 0.1s;
        }

        body.rotate-screen {
            width: 100vh !important;
            height: 100vw !important;
            transform: rotate(90deg);
            transform-origin: top left;
            position: absolute;
            top: 0;
            left: 100vw;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .date-container {
            display: flex;
            flex-direction: column;
        }

        #date {
            font-size: 1.4rem;
            font-weight: 900;
        }

        #day {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn:active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        main {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0;
            flex-direction: row;
        }

        @media (orientation: portrait) {
            body:not(.rotate-screen) main {
                flex-direction: column;
            }
            body:not(.rotate-screen) .left-col, 
            body:not(.rotate-screen) .right-col {
                flex: 1;
                width: 100%;
            }
        }

        .left-col {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clock-card {
            border: 4px solid var(--border-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--card-bg);
            flex: 1.2;
            min-height: 120px;
        }

        #time {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .weather-card {
            border: 4px solid var(--border-color);
            padding: 12px;
            background-color: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .weather-title {
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .weather-current {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .weather-icon-large {
            width: 56px;
            height: 56px;
            fill: var(--text-color);
        }

        .weather-info-main {
            text-align: right;
        }

        .temp-now {
            font-size: 2.2rem;
            font-weight: 900;
        }

        .weather-desc {
            font-size: 1rem;
            font-weight: bold;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border-top: 2px dashed var(--border-color);
            padding-top: 8px;
        }

        .forecast-day {
            text-align: center;
            font-size: 0.8rem;
        }

        .forecast-date {
            font-weight: bold;
            margin-bottom: 2px;
        }

        .forecast-icon {
            width: 22px;
            height: 22px;
            fill: var(--text-color);
            margin: 3px auto;
        }

        .forecast-temp {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .memo-card {
            border: 4px solid var(--border-color);
            padding: 12px;
            background-color: var(--card-bg);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .memo-title {
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        #memo-area {
            width: 100%;
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: none;
        }

        @keyframes pulse-flash {
            0% { background-color: #000000; }
            50% { background-color: #ffffff; }
            100% { background-color: transparent; }
        }

        footer {
            margin-top: 10px;
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.7;
            border-top: 1px solid var(--border-color);
            padding-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            z-index: 1000;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 4px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 6px;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 15px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="flash-overlay" class="flash-overlay"></div>

    <header>
        <div class="date-container">
            <span id="date">2026年07月17日</span>
            <span id="day">金曜日</span>
        </div>
        <div class="controls">
            <button class="btn" onclick="toggleRotation()">回転</button>
            <button class="btn" onclick="toggleDarkMode()">反転</button>
            <button class="btn" onclick="openSettings()">設定</button>
            <button class="btn" onclick="manualRefresh()">更新</button>
        </div>
    </header>

    <main>
        <div class="left-col">
            <div class="clock-card">
                <div id="time">20:52</div>
            </div>

            <div class="weather-card">
                <div class="weather-title">
                    <span id="location-name">天気予報 (豊川)</span>
                    <span style="font-size: 0.75rem; font-weight: normal;" id="weather-update-time">--:-- 更新</span>
                </div>
                <div class="weather-current">
                    <div id="weather-icon-container">
                        <svg class="weather-icon-large" viewBox="0 0 24 24" id="current-weather-icon">
                            <path d="M 12, 7.5 A 4.5,4.5 0 1,1 11.99,7.5 M 12, 1.5 A 1.5,1.5 0 1,1 11.99,1.5 M 12, 21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 2.5, 12 A 1.5,1.5 0 1,1 2.49,12 M 21.5, 12 A 1.5,1.5 0 1,1 21.49,12 M 18.7, 5.3 A 1.5,1.5 0 1,1 18.69,5.3 M 5.3, 5.3 A 1.5,1.5 0 1,1 5.29,5.3 M 18.7, 18.7 A 1.5,1.5 0 1,1 18.69,18.7 M 5.3, 18.7 A 1.5,1.5 0 1,1 5.29,18.7" />
                        </svg>
                    </div>
                    <div class="weather-info-main">
                        <div class="temp-now" id="temp-now">--°C</div>
                        <div class="weather-desc" id="weather-desc">読込中...</div>
                    </div>
                </div>

                <div class="forecast-grid" id="forecast-grid">
                    <div class="forecast-day">
                        <div class="forecast-date">明日</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                    <div class="forecast-day">
                        <div class="forecast-date">明後日</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                    <div class="forecast-day">
                        <div class="forecast-date">3日後</div>
                        <div class="forecast-temp">--°C</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="memo-card">
                <div class="memo-title">ToDo / 今日のメモ</div>
                <textarea id="memo-area" placeholder="ここにタスクやメモを入力（自動保存されます）..."></textarea>
            </div>
        </div>
    </main>

    <footer>
        <span id="status-text">画面タップで復帰します</span>
        <span>自動反転リフレッシュ: 毎正時</span>
    </footer>

    <div class="overlay" id="overlay" onclick="closeSettings()"></div>
    <div class="modal" id="settings-modal">
        <div class="modal-title">ダッシュボード設定</div>
        <div class="form-group">
            <label for="input-lat">緯度 (Latitude):</label>
            <input type="number" id="input-lat" class="form-control" step="0.0001" value="34.8247">
        </div>
        <div class="form-group">
            <label for="input-lon">経度 (Longitude):</label>
            <input type="number" id="input-lon" class="form-control" step="0.0001" value="137.3776">
            <small style="display: block; margin-top: 4px; opacity: 0.8;">※初期値は愛知県豊川市です。</small>
        </div>
        <div class="form-group">
            <label for="input-name">地域名表示:</label>
            <input type="text" id="input-name" class="form-control" value="豊川">
        </div>
        <div class="modal-buttons">
            <button class="btn" onclick="closeSettings()">キャンセル</button>
            <button class="btn" onclick="saveSettings()">保存</button>
        </div>
    </div>

    <script>
        let config = {
            lat: 34.8247,
            lon: 137.3776,
            name: "豊川",
            darkMode: false,
            rotated: false
        };

        let isMemoFocused = false;

        // --- スリープ復帰検知まわり ---
        // この端末の体験版ブラウザは古いWebKitで、visibilitychange (Page Visibility API) が
        // 使えない可能性があるため、「1秒ごとに呼ばれるはずの時計更新が、実際には何秒空いたか」を
        // 自己監視する方式でスリープ復帰を検知する。
        let lastTickTime = Date.now();
        const WAKE_GAP_THRESHOLD_MS = 5000; // これ以上間隔が空いたら「復帰した」とみなす
        const WEATHER_REFRESH_MS = 30 * 60 * 1000; // 天気は30分ごとに再取得
        let lastWeatherFetchTime = 0;

        const SVG_PATHS = {
            sunny: "M 12, 7.5 A 4.5,4.5 0 1,1 11.99,7.5 M 12, 1.5 A 1.5,1.5 0 1,1 11.99,1.5 M 12, 21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 2.5, 12 A 1.5,1.5 0 1,1 2.49,12 M 21.5, 12 A 1.5,1.5 0 1,1 21.49,12 M 18.7, 5.3 A 1.5,1.5 0 1,1 18.69,5.3 M 5.3, 5.3 A 1.5,1.5 0 1,1 5.29,5.3 M 18.7, 18.7 A 1.5,1.5 0 1,1 18.69,18.7 M 5.3, 18.7 A 1.5,1.5 0 1,1 5.29,18.7",
            cloudy: "M19.35,10.04C18.67,6.59 15.64,4 12,4C9.11,4 6.6,5.64 5.35,8.04C2.34,8.36 0,10.91 0,14C0,17.31 2.69,20 6,20H19C21.76,20 24,17.76 24,15C24,12.36 21.95,10.22 19.35,10.04Z",
            rainy: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 6,20 H 8 V 23 H 6 Z M 11,20 H 13 V 23 H 11 Z M 16,20 H 18 V 23 H 16 Z",
            snowy: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 7,21.5 A 1.5,1.5 0 1,1 6.99,21.5 M 12,21.5 A 1.5,1.5 0 1,1 11.99,21.5 M 17,21.5 A 1.5,1.5 0 1,1 16.99,21.5",
            thunderstorm: "M19.35,8.04C18.67,4.59 15.64,2 12,2C9.11,2 6.6,3.64 5.35,6.04C2.34,6.36 0,8.91 0,12C0,15.31 2.69,18 6,18H19C21.76,18 24,15.76 24,13C24,10.36 21.95,8.22 19.35,8.04Z M 13,17 L 9,21 H 12 L 11,24 L 15,20 H 12 Z"
        };

        const WEATHER_CODE_MAP = {
            0: { desc: "晴れ", icon: "sunny" },
            1: { desc: "ほぼ晴れ", icon: "sunny" },
            2: { desc: "晴れ時々曇り", icon: "cloudy" },
            3: { desc: "曇り", icon: "cloudy" },
            45: { desc: "霧", icon: "cloudy" },
            48: { desc: "霧", icon: "cloudy" },
            51: { desc: "小雨", icon: "rainy" },
            53: { desc: "小雨", icon: "rainy" },
            55: { desc: "小雨", icon: "rainy" },
            61: { desc: "雨", icon: "rainy" },
            63: { desc: "雨", icon: "rainy" },
            65: { desc: "大雨", icon: "rainy" },
            71: { desc: "小雪", icon: "snowy" },
            73: { desc: "雪", icon: "snowy" },
            75: { desc: "大雪", icon: "snowy" },
            77: { desc: "あられ", icon: "snowy" },
            80: { desc: "にわか雨", icon: "rainy" },
            81: { desc: "にわか雨", icon: "rainy" },
            82: { desc: "激しいにわか雨", icon: "rainy" },
            85: { desc: "にわか雪", icon: "snowy" },
            86: { desc: "にわか雪", icon: "snowy" },
            95: { desc: "雷雨", icon: "thunderstorm" },
            96: { desc: "雷雨", icon: "thunderstorm" },
            99: { desc: "雷雨", icon: "thunderstorm" }
        };

        window.onload = function() {
            loadConfig();
            initClock();
            initMemo();
            maybeRefreshWeather(true);

            // 古いWebKitでも動く範囲でのフォールバック。
            // 対応していれば効くし、対応していなくてもエラーにはならない。
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    handleWakeUp();
                }
            });
            window.addEventListener('focus', handleWakeUp);
            window.addEventListener('pageshow', handleWakeUp);
        };

        function loadConfig() {
            const saved = localStorage.getItem('kindle_dash_config');
            if (saved) {
                try {
                    config = JSON.parse(saved);
                    if (config.darkMode) {
                        document.body.classList.add('dark-mode');
                    }
                    if (config.rotated) {
                        document.body.classList.add('rotate-screen');
                    }
                } catch(e) {
                    console.error("設定読み込み失敗", e);
                }
            }
            document.getElementById('location-name').textContent = `天気予報 (${config.name})`;
        }

        function saveSettings() {
            config.lat = parseFloat(document.getElementById('input-lat').value) || 34.8247;
            config.lon = parseFloat(document.getElementById('input-lon').value) || 137.3776;
            config.name = document.getElementById('input-name').value || "登録地";
            
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
            closeSettings();
            
            document.getElementById('location-name').textContent = `天気予報 (${config.name})`;
            maybeRefreshWeather(true);
        }

        function openSettings() {
            document.getElementById('input-lat').value = config.lat;
            document.getElementById('input-lon').value = config.lon;
            document.getElementById('input-name').value = config.name;
            
            document.getElementById('settings-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function initClock() {
            update();
            setInterval(update, 1000);
        }

        function update() {
            const nowTick = Date.now();
            const gap = nowTick - lastTickTime;
            lastTickTime = nowTick;

            // 本来1秒おきに呼ばれるはずが、それより大きく間隔が空いた
            // = スリープ等でJSの実行が止まっていた = 今まさに復帰した、とみなす
            if (gap > WAKE_GAP_THRESHOLD_MS) {
                handleWakeUp();
            }

            renderClock();

            if (!isMemoFocused) {
                document.getElementById('status-text').textContent = "画面タップで復帰します";
            } else {
                document.getElementById('status-text').textContent = "メモ入力中";
            }
        }

        function renderClock() {
            const days = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const jstNow = new Date(utc + 32400000);

            const hours = String(jstNow.getHours()).padStart(2, '0');
            const minutes = String(jstNow.getMinutes()).padStart(2, '0');
            const seconds = String(jstNow.getSeconds()).padStart(2, '0');

            document.getElementById('time').textContent = `${hours}:${minutes}`;

            const yyyy = jstNow.getFullYear();
            const mm = String(jstNow.getMonth() + 1).padStart(2, '0');
            const dd = String(jstNow.getDate()).padStart(2, '0');
            document.getElementById('date').textContent = `${yyyy}年${mm}月${dd}日`;
            document.getElementById('day').textContent = days[jstNow.getDay()];

            if (minutes === "00" && seconds === "00") {
                triggerAntiGhosting();
            }
        }

        function handleWakeUp() {
            // スリープ復帰の瞬間、時計・天気を即座に最新化し、
            // 「今、目が覚めた」感を出すために軽く画面を反転させる
            renderClock();
            maybeRefreshWeather(false);
            triggerAntiGhosting();
        }

        function manualRefresh() {
            maybeRefreshWeather(true);
            triggerAntiGhosting();
        }

        function initMemo() {
            const memoArea = document.getElementById('memo-area');
            const savedMemo = localStorage.getItem('kindle_dash_memo');
            if (savedMemo) {
                memoArea.value = savedMemo;
            }
            
            memoArea.addEventListener('input', function() {
                localStorage.setItem('kindle_dash_memo', memoArea.value);
            });

            memoArea.addEventListener('focus', function() {
                isMemoFocused = true;
            });

            memoArea.addEventListener('blur', function() {
                isMemoFocused = false;
            });
        }

        function maybeRefreshWeather(force) {
            const now = Date.now();
            if (force || lastWeatherFetchTime === 0 || (now - lastWeatherFetchTime) >= WEATHER_REFRESH_MS) {
                fetchWeather();
            }
        }

        function fetchWeather() {
            lastWeatherFetchTime = Date.now();
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            updateWeatherData(data);
                        } catch(e) {
                            document.getElementById('weather-desc').textContent = "データ解析エラー";
                        }
                    } else {
                        document.getElementById('weather-desc').textContent = "通信エラー";
                    }
                }
            };
            xhr.send();
        }

        function updateWeatherData(data) {
            const current = data.current_weather;
            const currentCode = current.weathercode;
            const currentTemp = Math.round(current.temperature);
            
            const weatherInfo = WEATHER_CODE_MAP[currentCode] || { desc: "不明", icon: "sunny" };
            
            document.getElementById('temp-now').textContent = `${currentTemp}°C`;
            document.getElementById('weather-desc').textContent = weatherInfo.desc;
            
            const iconSvg = document.getElementById('current-weather-icon');
            const pathData = SVG_PATHS[weatherInfo.icon] || SVG_PATHS.sunny;
            iconSvg.innerHTML = `<path d="${pathData}" />`;

            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const jstNow = new Date(utc + 32400000);
            const timeStr = String(jstNow.getHours()).padStart(2, '0') + ":" + String(jstNow.getMinutes()).padStart(2, '0');
            document.getElementById('weather-update-time').textContent = `${timeStr} 更新`;

            const daily = data.daily;
            const forecastGrid = document.getElementById('forecast-grid');
            forecastGrid.innerHTML = '';

            for (let i = 1; i <= 3; i++) {
                const dateObj = new Date(daily.time[i]);
                const dayLabels = ["日", "月", "火", "水", "木", "金", "土"];
                const label = `${dateObj.getMonth() + 1}/${dateObj.getDate()}(${dayLabels[dateObj.getDay()]})`;
                
                const code = daily.weathercode[i];
                const info = WEATHER_CODE_MAP[code] || { desc: "不明", icon: "sunny" };
                const pData = SVG_PATHS[info.icon] || SVG_PATHS.sunny;
                
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);

                const forecastHtml = `
                    <div class="forecast-day">
                        <div class="forecast-date">${label}</div>
                        <svg class="forecast-icon" viewBox="0 0 24 24">
                            <path d="${pData}" />
                        </svg>
                        <div class="forecast-temp">${maxTemp}/${minTemp}°C</div>
                    </div>
                `;
                forecastGrid.insertAdjacentHTML('beforeend', forecastHtml);
            }
        }

        function triggerAntiGhosting() {
            const overlay = document.getElementById('flash-overlay');
            overlay.style.display = 'block';
            overlay.style.animation = 'pulse-flash 0.8s ease-in-out 1'; 
            
            setTimeout(function() {
                overlay.style.display = 'none';
                overlay.style.animation = '';
            }, 800);
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            config.darkMode = isDark;
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
        }

        function toggleRotation() {
            const isRotated = document.body.classList.toggle('rotate-screen');
            config.rotated = isRotated;
            localStorage.setItem('kindle_dash_config', JSON.stringify(config));
            triggerAntiGhosting();
        }
    </script>
</body>
</html>
