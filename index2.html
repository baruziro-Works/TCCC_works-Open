<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動ふりがな付与ツール</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Kuromoji.js 本体 -->
    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <!-- Mammoth.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        /* カスタムスタイル */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #outputArea {
            font-size: 1.125rem;
            line-height: 2;
        }
        #outputArea p { margin-bottom: 1em; }
        ruby { ruby-position: over; ruby-align: center; }
        rt { font-size: 0.6em; color: #4b5563; }
        
        /* スクロールバー装飾 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- ローディングオーバーレイ -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <div id="loadingText" class="text-center">
            <p class="text-slate-600 font-medium">辞書データを読み込んでいます...</p>
            <p class="text-sm font-normal text-slate-400 mt-1">初回は数秒〜十数秒かかる場合があります</p>
        </div>
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-full opacity-0 transition-all duration-300 z-40 pointer-events-none">
        メッセージ
    </div>

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 shadow-sm py-4 px-6 shrink-0 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">自動ふりがな付与ツール</h1>
        </div>
        <div class="text-sm text-slate-500 hidden sm:block">Powered by Kuromoji.js</div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 overflow-hidden p-4 md:p-6">
        <div class="max-w-7xl mx-auto h-full grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- 左カラム：入力エリア -->
            <div class="flex flex-col h-full space-y-4 overflow-y-auto pr-2 pb-4">
                
                <!-- 原文入力 -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col shrink-0">
                    <div class="flex items-center justify-between mb-3">
                        <label class="font-semibold text-slate-700 flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            原文入力
                        </label>
                        <div>
                            <input type="file" id="inputFile" accept=".txt,.docx" class="hidden" onchange="handleFileSelect(event, 'inputArea', false)">
                            <button onclick="document.getElementById('inputFile').click()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                ファイル読込
                            </button>
                        </div>
                    </div>
                    <textarea id="inputArea" class="w-full border border-slate-300 rounded-lg p-3 text-slate-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-y min-h-[160px]" placeholder="ここにふりがなを振りたいテキストを入力、またはファイルを読み込んでください。"></textarea>
                </div>

                <!-- カスタム辞書 -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col flex-1">
                    <div class="flex items-center justify-between mb-3">
                        <label class="font-semibold text-slate-700 flex items-center gap-2">
                            <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                            カスタム辞書 (優先)
                        </label>
                        <div>
                            <input type="file" id="dictFile" accept=".txt,.csv,.docx" class="hidden" onchange="handleFileSelect(event, 'customDictArea', true)">
                            <button onclick="document.getElementById('dictFile').click()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-md transition duration-150 flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                追記
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mb-2">「単語,ふりがな」または「単語 ふりがな」の形式で入力</p>
                    <textarea id="customDictArea" class="w-full border border-slate-300 rounded-lg p-3 text-slate-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none flex-1 resize-none min-h-[120px]" placeholder="例:&#10;東京特許許可局,とうきょうとっきょきょかきょく"></textarea>
                </div>

                <!-- 実行ボタン -->
                <button onclick="processFurigana()" id="processBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center gap-2 transform active:scale-[0.98]" disabled>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    ふりがなを付ける
                </button>
            </div>

            <!-- 右カラム：出力エリア -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                <!-- ツールバー -->
                <div class="bg-slate-50 border-b border-slate-200 p-3 flex flex-wrap gap-2 items-center justify-between shrink-0">
                    <span class="font-semibold text-slate-700 flex items-center gap-2 px-2">
                        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        出力結果
                    </span>
                    <div class="flex gap-2">
                        <button onclick="copyToClipboard()" class="bg-white hover:bg-slate-100 border border-slate-300 text-slate-700 text-sm font-medium py-1.5 px-3 rounded-md transition duration-150 flex items-center gap-1 shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            コピー
                        </button>
                        <button onclick="saveAsWord()" class="bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 text-sm font-medium py-1.5 px-3 rounded-md transition duration-150 flex items-center gap-1 shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Word保存
                        </button>
                    </div>
                </div>
                
                <!-- リッチテキストエディタ -->
                <div id="outputArea" contenteditable="true" class="flex-1 p-5 overflow-y-auto focus:outline-none focus:ring-inset focus:ring-2 focus:ring-blue-100 transition" spellcheck="false">
                    <p class="text-slate-400 italic">ここに結果が表示されます。</p>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        let tokenizer = null;

        document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const spinner = document.querySelector('.spinner');

            function showError(message, detail) {
                if(spinner) spinner.style.display = 'none';
                loadingText.innerHTML = `<p class="text-red-500 font-bold mb-2">${message}</p><p class="text-sm text-slate-600">${detail}</p>`;
            }

            if (typeof kuromoji === 'undefined') {
                showError("システムの読み込みに失敗しました", "kuromoji.jsがブロックされています。");
                return;
            }

            const slowLoadTimer = setTimeout(() => {
                const hint = document.createElement('p');
                hint.className = "text-orange-500 text-sm mt-3 font-medium animate-pulse";
                hint.textContent = "※通信に時間がかかっています...";
                loadingText.appendChild(hint);
            }, 8000);

            const timeoutTimer = setTimeout(() => {
                showError("読み込みがタイムアウトしました", "外部からの辞書取得に失敗しました。<br>解決策2（辞書フォルダの直接配置）をお試しください。");
            }, 20000);

            // 【重要】解決策1：ブラウザに勝手に解凍させないため、GitHubの生データ(Raw)から直接取得する
            let dicUrl = "https://raw.githubusercontent.com/takuyaa/kuromoji.js/master/dict/";
            
            // ★【解決策2用】どうしても動かない場合は、上の let dicUrl = ... の行の先頭に // を付けて無効化し、
            // 以下の行の先頭の // を消して有効にしてください。
            // let dicUrl = "./dict/";

            kuromoji.builder({ dicPath: dicUrl }).build(function (err, _tokenizer) {
                clearTimeout(slowLoadTimer);
                clearTimeout(timeoutTimer);

                if (err) {
                    console.error(err);
                    showError("辞書データの読み込みに失敗しました", "外部サーバーとの相性問題が発生しています。");
                } else {
                    tokenizer = _tokenizer;
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.style.display = 'none', 300);
                    document.getElementById('processBtn').disabled = false;
                    showToast("準備完了");
                }
            });
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('translate-y-full', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-full', 'opacity-0'), 3000);
        }

        function handleFileSelect(event, targetElementId, isAppend) {
            const file = event.target.files[0];
            if (!file) return;
            const extension = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();

            if (extension === 'docx') {
                reader.onload = function(e) {
                    mammoth.extractRawText({arrayBuffer: e.target.result})
                        .then(res => { updateTargetArea(targetElementId, res.value, isAppend); showToast("読込完了"); })
                        .catch(err => { console.error(err); showToast("読込失敗"); });
                };
                reader.readAsArrayBuffer(file);
            } else if (extension === 'txt' || extension === 'csv') {
                reader.onload = function(e) { updateTargetArea(targetElementId, e.target.result, isAppend); showToast("読込完了"); };
                reader.readAsText(file);
            }
            event.target.value = '';
        }

        function updateTargetArea(targetId, text, isAppend) {
            const target = document.getElementById(targetId);
            if (isAppend) {
                const currentVal = target.value;
                target.value = currentVal + (currentVal && !currentVal.endsWith('\n') ? '\n' : '') + text;
            } else {
                target.value = text;
            }
        }

        function processFurigana() {
            if (!tokenizer) return showToast("準備中...");
            const inputText = document.getElementById('inputArea').value;
            if (!inputText.trim()) return showToast("原文を入力してください");

            const customDictText = document.getElementById('customDictArea').value;
            const customDict = parseCustomDict(customDictText);
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = '';

            inputText.split(/\r?\n/).forEach(line => {
                const pNode = document.createElement('p');
                if (line === '') pNode.appendChild(document.createElement('br'));
                else pNode.textContent = line;

                if (customDict.length > 0) applyCustomDict(pNode, customDict);
                applyKuromoji(pNode, tokenizer);
                outputArea.appendChild(pNode);
            });
            showToast("完了しました");
        }

        function parseCustomDict(text) {
            const dict = [];
            text.split(/\r?\n/).forEach(line => {
                const match = line.trim().match(/^([^\s,、]+)[\s,、]+(.+)$/);
                if (match) dict.push({ word: match[1], ruby: match[2].trim() });
            });
            return dict.sort((a, b) => b.word.length - a.word.length);
        }

        function applyCustomDict(container, customDict) {
            for (const item of customDict) {
                if (!item.word) continue;
                const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while (node = walker.nextNode()) {
                    if (node.parentNode.nodeName !== 'RT' && node.parentNode.nodeName !== 'RUBY') textNodes.push(node);
                }

                for (let textNode of textNodes) {
                    const text = textNode.nodeValue;
                    if (!text.includes(item.word)) continue;
                    const parts = text.split(item.word);
                    const frag = document.createDocumentFragment();
                    
                    for (let i = 0; i < parts.length; i++) {
                        if (parts[i]) frag.appendChild(document.createTextNode(parts[i]));
                        if (i < parts.length - 1) {
                            const rubyEl = document.createElement('ruby');
                            rubyEl.textContent = item.word;
                            const rt = document.createElement('rt');
                            rt.textContent = item.ruby;
                            rubyEl.appendChild(rt);
                            frag.appendChild(rubyEl);
                        }
                    }
                    textNode.parentNode.replaceChild(frag, textNode);
                }
            }
        }

        function applyKuromoji(container, tokenizer) {
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while (node = walker.nextNode()) {
                if (node.parentNode.nodeName !== 'RT' && node.parentNode.nodeName !== 'RUBY' && /[\u4e00-\u9faf]/.test(node.nodeValue)) {
                    textNodes.push(node);
                }
            }

            for (let textNode of textNodes) {
                const tokens = tokenizer.tokenize(textNode.nodeValue);
                const frag = document.createDocumentFragment();

                for (let token of tokens) {
                    const surface = token.surface_form;
                    const reading = token.reading;

                    if (!/[\u4e00-\u9faf]/.test(surface)) {
                        frag.appendChild(document.createTextNode(surface));
                        continue;
                    }

                    if (reading) {
                        const rubyData = calculateOkurigana(surface, katakanaToHiragana(reading));
                        if (rubyData.prefix) frag.appendChild(document.createTextNode(rubyData.prefix));
                        const rubyEl = document.createElement('ruby');
                        rubyEl.textContent = rubyData.kanji;
                        const rt = document.createElement('rt');
                        rt.textContent = rubyData.ruby;
                        rubyEl.appendChild(rt);
                        frag.appendChild(rubyEl);
                        if (rubyData.suffix) frag.appendChild(document.createTextNode(rubyData.suffix));
                    } else {
                        frag.appendChild(document.createTextNode(surface));
                    }
                }
                textNode.parentNode.replaceChild(frag, textNode);
            }
        }

        function katakanaToHiragana(str) {
            return str.replace(/[\u30A1-\u30F6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60));
        }

        function calculateOkurigana(surface, reading) {
            if (surface === reading) return { prefix: '', kanji: surface, ruby: reading, suffix: '' };
            let prefix = '', suffix = '', kanji = surface, ruby = reading;
            
            let i = 0;
            while (i < kanji.length && i < ruby.length && kanji[i] === ruby[i]) i++;
            if (i > 0) { prefix = kanji.substring(0, i); kanji = kanji.substring(i); ruby = ruby.substring(i); }

            let j = 1;
            while (j <= kanji.length && j <= ruby.length && kanji[kanji.length - j] === ruby[ruby.length - j]) j++;
            j--;
            if (j > 0) { suffix = kanji.substring(kanji.length - j); kanji = kanji.substring(0, kanji.length - j); ruby = ruby.substring(0, ruby.length - j); }

            return { prefix, kanji, ruby, suffix };
        }

        function copyToClipboard() {
            const outputArea = document.getElementById('outputArea');
            const range = document.createRange();
            range.selectNodeContents(outputArea);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            try { document.execCommand('copy'); showToast("コピーしました"); } 
            catch (err) { showToast("コピーに失敗しました"); }
            selection.removeAllRanges();
        }

        function saveAsWord() {
            const outputHTML = document.getElementById('outputArea').innerHTML;
            const style = `<style>body { font-family: 'Yu Mincho', 'MS Mincho', serif; font-size: 11pt; } ruby { ruby-position: over; ruby-align: center; } rt { font-size: 6pt; } p { margin: 0 0 1em 0; }</style>`;
            const sourceHTML = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>ルビ付き文書</title>" + style + "</head><body>" + outputHTML + "</body></html>";
            const source = 'data:application/vnd.ms-word;charset=utf-8,\ufeff' + encodeURIComponent(sourceHTML);
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = 'ルビ付き文書.doc';
            fileDownload.click();
            document.body.removeChild(fileDownload);
            showToast("Word保存しました");
        }
    </script>
</body>
</html>
