<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案内用QRコード作成＆印刷</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.jsの読み込み（PDF化用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ベースフォントを明朝体やゴシック体など印刷に適したものに */
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', Meiryo, sans-serif;
            background-color: #f1f5f9;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* 画面上でのA4プレビュー領域のスタイル */
        .a4-preview-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }
        .a4-page {
            width: 210mm;
            /* PDF生成時の微細な計算誤差による白紙の2ページ目発生を防ぐため、297mmより少し小さく(295mm)設定 */
            height: 295mm; 
            max-height: 295mm;
            background-color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 20mm; /* A4用紙の余白設定（上下左右20mm） */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden; /* はみ出しを確実に防止 */
        }

        /* --- 印刷用のスタイル（ここが重要） --- */
        @media print {
            /* 印刷時は背景色や余計なものを消す */
            body { background-color: transparent; }
            .no-print { display: none !important; }
            
            /* A4用紙の設定 */
            @page {
                size: A4 portrait;
                margin: 0; /* ブラウザのヘッダー/フッターを消すために0に */
            }
            
            /* プレビュー領域をそのまま印刷用ページにする */
            .a4-preview-wrapper {
                padding: 0;
                display: block;
            }
            .a4-page {
                width: 100%;
                height: 100vh;
                min-height: auto;
                box-shadow: none;
                padding: 15mm 20mm; /* 印刷時の実質的な余白 */
                page-break-after: always;
            }
            
            /* 印刷時の色調整を強制 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <!-- 画面操作エリア（印刷時は非表示） -->
    <div class="no-print max-w-4xl mx-auto pt-8 px-4">
        <div class="bg-white rounded-xl shadow-md p-6 sm:p-8 mb-8 border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-800 mb-2 border-b pb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
                案内用紙・QRコード一括作成ツール
            </h1>
            <p class="text-slate-600 text-sm mb-6">
                各項目のURLを入力して「プレビューを作成」を押してください。<br>
                ※入力内容は自動的にスプレッドシートに保存され、次回開いた時に復元されます。
            </p>

            <form id="mainForm" class="space-y-6">
                <!-- 1. 説教振返り動画 -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-1 flex items-center gap-2">
                        <span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-xs">1</span>
                        説教振返り動画 のURL
                    </label>
                    <input type="url" id="url_movie" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="https://youtube.com/..." required>
                </div>

                <!-- 2. 週報 -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-1 flex items-center gap-2">
                        <span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-xs">2</span>
                        週報 のURL
                    </label>
                    <input type="url" id="url_weekly" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="https://..." required>
                </div>

                <!-- 3. 月間予定表 -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-1 flex items-center gap-2">
                        <span class="bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded text-xs">3</span>
                        月間予定表 のURL
                    </label>
                    <input type="url" id="url_monthly" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="https://..." required>
                </div>

                <!-- ボタンエリア -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t">
                    <button type="submit" id="generateBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 transition-colors">
                        <svg id="loadingIcon" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="btnText">プレビューを作成する</span>
                    </button>
                    
                    <button type="button" id="directPrintBtn" disabled class="flex-1 bg-teal-600 hover:bg-teal-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                        プリンターで印刷
                    </button>

                    <button type="button" id="printBtn" disabled class="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 transition-colors">
                        <svg id="downloadIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <svg id="pdfLoadingIcon" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span id="printBtnText">PDFを保存</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 印刷用A4プレビュー領域 -->
    <div id="previewArea" class="a4-preview-wrapper hidden no-print">
        <div class="a4-page text-slate-800 animate-fade-in" id="printablePage">
            <!-- ここにJavaScriptで内容が生成されます -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 各項目の設定定義
            const sectionsData = [
                {
                    id: 'movie',
                    title: '礼拝説教 振り返り動画',
                    desc: 'スマートフォンのカメラでQRコードを読み込むと、<br>礼拝の振り返り用動画（YouTube）のページが開きます。'
                },
                {
                    id: 'weekly',
                    title: '今週の週報',
                    desc: 'スマートフォンのカメラでQRコードを読み込むと、<br>今週の週報をスマートフォン上でご確認いただけます。'
                },
                {
                    id: 'monthly',
                    title: '最新の月間予定表',
                    desc: 'スマートフォンのカメラでQRコードを読み込むと、<br>教会の最新の月間予定表をご確認いただけます。'
                }
            ];

            const form = document.getElementById('mainForm');
            const generateBtn = document.getElementById('generateBtn');
            const printBtn = document.getElementById('printBtn');
            const directPrintBtn = document.getElementById('directPrintBtn');
            const btnText = document.getElementById('btnText');
            const printBtnText = document.getElementById('printBtnText');
            const downloadIcon = document.getElementById('downloadIcon');
            const pdfLoadingIcon = document.getElementById('pdfLoadingIcon');
            const loadingIcon = document.getElementById('loadingIcon');
            const previewArea = document.getElementById('previewArea');
            const printablePage = document.getElementById('printablePage');

            // 👇👇👇👇👇 ここです！ 👇👇👇👇👇
            // -------------------------------------------------------------
            // 【重要】ここにスプレッドシートの「ウェブアプリのURL」を貼り付けてください！
            // 例: const GAS_URL = 'https://script.google.com/macros/s/XXXXX/exec';
            // -------------------------------------------------------------
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzIJ6c2sFRYJOGPA-fXQr2FhGNsvRGP59VGfTerHa_4dmLnkaBN1p7KXdzIVPgEUQQ/exec'; 
            // 👆👆👆👆👆 ここです！ 👆👆👆👆👆


            // 1. データの復元処理
            if (GAS_URL !== '') {
                // スプレッドシートから読み込む
                fetch(GAS_URL)
                    .then(response => response.json())
                    .then(data => {
                        if (data.movie) document.getElementById('url_movie').value = data.movie;
                        if (data.weekly) document.getElementById('url_weekly').value = data.weekly;
                        if (data.monthly) document.getElementById('url_monthly').value = data.monthly;
                    })
                    .catch(error => console.error('スプレッドシート読み込みエラー:', error));
            } else {
                // スプレッドシート未設定時は、パソコンのローカルストレージから復元
                sectionsData.forEach(sec => {
                    const inputEl = document.getElementById(`url_${sec.id}`);
                    const savedUrl = localStorage.getItem(`saved_url_${sec.id}`);
                    if (savedUrl) {
                        inputEl.value = savedUrl;
                    }
                });
            }

            // 文字が入力・変更されるたびに即座にローカルへ自動保存
            sectionsData.forEach(sec => {
                const inputEl = document.getElementById(`url_${sec.id}`);
                inputEl.addEventListener('input', (e) => {
                    localStorage.setItem(`saved_url_${sec.id}`, e.target.value);
                });
            });

            // プリンターで直接印刷ボタンのイベント
            directPrintBtn.addEventListener('click', () => {
                window.print();
            });

            // PDFダウンロードボタンのイベント
            printBtn.addEventListener('click', () => {
                // ダウンロード中のUI表示
                printBtn.disabled = true;
                printBtnText.textContent = 'PDF作成中...';
                downloadIcon.classList.add('hidden');
                pdfLoadingIcon.classList.remove('hidden');

                const element = document.getElementById('printablePage');
                
                // PDF出力のオプション設定
                const opt = {
                    margin:       0,
                    filename:     '教会案内QRコード.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, scrollY: 0 }, // scrollY: 0 で上部余白ズレを防止
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                // html2pdfライブラリを使用してPDF化し、ダウンロード
                html2pdf().set(opt).from(element).save().then(() => {
                    // ダウンロード完了後にUIを元に戻す
                    printBtn.disabled = false;
                    printBtnText.textContent = 'PDFを保存';
                    downloadIcon.classList.remove('hidden');
                    pdfLoadingIcon.classList.add('hidden');
                }).catch(err => {
                    console.error('PDF作成エラー:', err);
                    alert('PDFの作成に失敗しました。');
                    printBtn.disabled = false;
                    printBtnText.textContent = 'PDFを保存';
                    downloadIcon.classList.remove('hidden');
                    pdfLoadingIcon.classList.add('hidden');
                });
            });

            // URL短縮処理関数（is.gdを使用）
            async function getShortUrl(longUrl) {
                let url = longUrl.trim();
                if (!url.startsWith('http')) url = 'https://' + url;
                
                try {
                    const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    if (data.shorturl) {
                        return data.shorturl;
                    }
                    throw new Error("短縮失敗");
                } catch (error) {
                    console.error('URL短縮エラー:', error);
                    // エラー時は元のURLをそのまま返す（フォールバック）
                    return url; 
                }
            }

            // フォーム送信（プレビュー生成）イベント
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // --- スプレッドシートへの保存処理 ---
                if (GAS_URL !== '') {
                    const movieUrl = document.getElementById('url_movie').value;
                    const weeklyUrl = document.getElementById('url_weekly').value;
                    const monthlyUrl = document.getElementById('url_monthly').value;
                    
                    // URLパラメータを使ってデータを送信する
                    const saveUrl = `${GAS_URL}?action=save&movie=${encodeURIComponent(movieUrl)}&weekly=${encodeURIComponent(weeklyUrl)}&monthly=${encodeURIComponent(monthlyUrl)}`;
                    fetch(saveUrl).catch(err => console.error("スプレッドシート保存エラー:", err));
                }

                // ボタンをローディング状態に
                generateBtn.disabled = true;
                btnText.textContent = '生成中...';
                loadingIcon.classList.remove('hidden');
                printBtn.disabled = true;
                directPrintBtn.disabled = true;
                previewArea.classList.add('hidden');
                printablePage.innerHTML = ''; // クリア

                try {
                    let htmlContent = '';

                    // 3つの項目を順番に処理
                    for (let i = 0; i < sectionsData.length; i++) {
                        const sec = sectionsData[i];
                        const inputEl = document.getElementById(`url_${sec.id}`);
                        const longUrl = inputEl.value;

                        // 入力値をローカルストレージに保存
                        localStorage.setItem(`saved_url_${sec.id}`, longUrl);

                        // URL短縮APIを呼び出し
                        const shortUrl = await getShortUrl(longUrl);
                        
                        // QRコード画像URL（QR Server使用、少し大きめ高画質に設定）
                        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shortUrl)}&margin=0`;

                        // 印刷用HTMLブロックの生成
                        // 最後の要素以外は下線を引く
                        const borderClass = i < sectionsData.length - 1 ? 'border-b-2 border-slate-200 border-dashed pb-8 mb-8' : '';

                        htmlContent += `
                            <div class="flex items-center gap-8 ${borderClass} flex-1">
                                <!-- 左側：QRコード -->
                                <div class="w-40 h-40 flex-shrink-0 bg-white p-2 border-2 border-slate-800 rounded-xl shadow-sm">
                                    <img src="${qrUrl}" alt="QRコード" class="w-full h-full object-contain" crossorigin="anonymous">
                                </div>
                                
                                <!-- 右側：説明文 -->
                                <div class="flex-grow">
                                    <h2 class="text-2xl font-black text-slate-900 mb-3 tracking-wide">
                                        <span class="inline-block bg-slate-800 text-white text-sm px-3 py-1 rounded-full align-middle mr-2 font-bold mb-1">
                                            ご案内
                                        </span><br/>
                                        ${sec.title}
                                    </h2>
                                    <p class="text-lg text-slate-700 leading-relaxed font-medium mb-4">
                                        ${sec.desc}
                                    </p>
                                    <div class="bg-slate-100 px-4 py-2 rounded-md inline-block">
                                        <p class="text-sm text-slate-600 font-bold">
                                            リンク: <span class="text-blue-700 tracking-wider">${shortUrl}</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        // APIへの連続アクセス負荷を少し和らげるための待機(0.3秒)
                        await new Promise(resolve => setTimeout(resolve, 300));
                    }

                    // 生成したHTMLをページに挿入
                    printablePage.innerHTML = htmlContent;

                    // プレビュー表示＆印刷ボタン有効化
                    previewArea.classList.remove('hidden');
                    // 印刷時に表示されるように、no-printクラスを外す
                    previewArea.classList.remove('no-print');
                    printBtn.disabled = false;
                    directPrintBtn.disabled = false;

                } catch (error) {
                    alert('処理中にエラーが発生しました。インターネット接続を確認してください。');
                    console.error(error);
                } finally {
                    // ボタンの状態を元に戻す
                    generateBtn.disabled = false;
                    btnText.textContent = 'プレビューを再作成する';
                    loadingIcon.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
