    // 各ボタン高速フック登録
    bindFastTap('btn-input-clear', clearInput);
    bindFastTap('btn-input-save', addMemo);

    // メモ処理 (新規保存＆上書き変更の判定)
    function addMemo() {
        var text = document.getElementById('txt-memo-input').value.trim();
        if (!text) return;
        
        if (selectedMemoId) {
            // 【変更】編集モード：選ばれているメモの中身を直接上書き保存します
            var index = memos.findIndex(function(item) { return item.id === selectedMemoId; });
            if (index !== -1) {
                memos[index].text = text;
                saveData();
                selectMemo(selectedMemoId); // 再描画して詳細エリアを更新
            }
        } else {
            // 新規作成モード
            var newMemo = {
                id: 'memo_' + Date.now(),
                text: text,
                time: Date.now(),
                checked: false,
                checkedTime: null
            };
            
            memos.unshift(newMemo);
            saveData();
            document.getElementById('txt-memo-input').value = '';
            selectMemo(newMemo.id);
        }
    }
    
    // クリア / 選択解除ボタンの動作
    function clearInput() {
        document.getElementById('txt-memo-input').value = '';
        if (selectedMemoId) {
            // 【変更】メモ選択中なら選択状態を安全に解除します
            selectedMemoId = null;
            document.getElementById('btn-input-save').innerText = '覚書メモとして保存';
            document.getElementById('btn-input-clear').innerText = 'クリア';
            document.getElementById('view-title').innerText = '選択されていません';
            document.getElementById('view-body').innerText = '左側のリストからメモを選んでください。';
            renderMemoList();
        }
    }
    
    // メモが選ばれたときの処理
    function selectMemo(id) {
        selectedMemoId = id;
        renderMemoList();
        
        var m = memos.find(function(item) { return item.id === id; });
        if (!m) return;
        
        var viewerTitle = document.getElementById('view-title');
        var viewerBody = document.getElementById('view-body');
        
        viewerTitle.innerHTML = '';
        
        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.style.transform = 'scale(1.6)';
        chk.style.marginRight = '16px';
        chk.checked = m.checked;
        
        chk.addEventListener('change', function() {
            toggleCheckMemo(m.id, chk.checked);
        });
        
        var titleSpan = document.createElement('span');
        titleSpan.style.verticalAlign = 'middle';
        titleSpan.innerText = m.text.split('\n')[0] || '無題のメモ';
        
        viewerTitle.appendChild(chk);
        viewerTitle.appendChild(titleSpan);
        
        viewerBody.innerHTML = '';
        
        var bodySpan = document.createElement('span');
        bodySpan.innerText = m.text;
        viewerBody.appendChild(bodySpan);
        
        // 【変更】選択したメモの内容を入力エリアにロードし、ボタンの表示を編集モードに切り替えます
        document.getElementById('txt-memo-input').value = m.text;
        document.getElementById('btn-input-save').innerText = 'メモを上書き保存';
        document.getElementById('btn-input-clear').innerText = '選択を解除';
        
        showDashboard();
    }
    
    function toggleCheckMemo(id, isChecked) {
        var index = memos.findIndex(function(item) { return item.id === id; });
        if (index === -1) return;
        
        memos[index].checked = isChecked;
        memos[index].checkedTime = isChecked ? Date.now() : null;
        
        var activeItems = memos.filter(function(item) { return !item.checked; });
        var checkedItems = memos.filter(function(item) { return item.checked; });
        
        checkedItems.sort(function(a, b) { return b.checkedTime - a.checkedTime; });
        
        memos = activeItems.concat(checkedItems);
        saveData();
        selectMemo(id);
    }
    
    function sweepMemos() {
        var now = Date.now();
        var cutoffTime = 26 * 60 * 60 * 1000;
        var originalLength = memos.length;
        
        memos = memos.filter(function(m) {
            if (m.checked && m.checkedTime) {
                var elapsed = now - m.checkedTime;
                var hour = new Date().getHours();
                if (elapsed >= cutoffTime && hour === 0) {
                    return false;
                }
            }
            return true;
        });
        
        if (memos.length !== originalLength) {
            saveData();
            if (!memos.find(function(m) { return m.id === selectedMemoId; })) {
                document.getElementById('view-title').innerText = '選択されていません';
                document.getElementById('view-body').innerText = '左側のリストからメモを選んでください。';
            }
        }
    }
    
    function saveData() {
        localStorage.setItem('dashboard_memos', JSON.stringify(memos));
        renderMemoList();
    }

### 🛠️ 今回のアップデートまとめ

1. **既存メモの修正ができるようになりました！**
   メモを一覧からタップすると、自動的にその内容がすぐに入力欄へ読み込まれます。必要箇所を直して、青い「メモを上書き保存」ボタンを押すだけでいつでも文章をアップデートできます。「選択を解除」を押せば、いつでも新規メモ作成に戻れます。
2. **日付と時間を超・大きく横並び表示！**
   スペースをうまく活かして1行に収めたため、日付の視認性も時間のフォントの迫力も数段パワーアップしました。ダッシュボードがより見やすくなっています。
3. **無駄な「戻る」ボタンのカットで一覧性が向上！**
   ドルフィンブラウザ上でメニューボタンをパチパチ触るだけで表示切り替えができるようになったため、余分なフッター（底のボタンエリア）をカットしました。その分メモ一覧の下限が広がり、一度にスクロールできる高さが大幅に増えてすっきりしました。
