<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキスト読み上げ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-hover: #c8c4bb;
    --text: #1a1917;
    --text-sub: #6b6860;
    --text-hint: #a09d97;
    --accent: #2a6b50;
    --accent-light: #e8f4ef;
    --accent-mid: #5daa88;
    --warn: #b05e10;
    --warn-light: #fef3e8;
    --played: #ebe9e4;
    --current-bg: #c8eadb;
    --current-text: #164d35;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header span {
    font-size: 13px;
    color: var(--text-hint);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  textarea {
    width: 100%;
    height: 130px;
    resize: vertical;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent-mid); }
  textarea::placeholder { color: var(--text-hint); }

  .char-count {
    font-size: 11px;
    color: var(--text-hint);
    text-align: right;
    margin-top: 5px;
  }

  /* Preview */
  #preview-box {
    font-size: 14px;
    line-height: 2;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    min-height: 60px;
  }

  .seg {
    display: inline;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    transition: background 0.12s;
  }

  .seg:hover { background: var(--accent-light); }
  .seg.played { color: var(--text-hint); }
  .seg.current {
    background: var(--current-bg);
    color: var(--current-text);
    border-radius: 3px;
    font-weight: 500;
  }

  /* Position Slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
  }

  .pos-label {
    font-size: 13px;
    font-weight: 500;
    min-width: 70px;
    text-align: right;
    color: var(--text);
  }

  /* Settings Grid */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .settings-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-sub);
    display: block;
    margin-bottom: 5px;
  }

  .field label span {
    font-weight: 500;
    color: var(--text);
  }

  select {
    width: 100%;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  select:focus { border-color: var(--accent-mid); }

  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  button {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    padding: 11px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
  }

  button:hover { background: var(--bg); border-color: var(--border-hover); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

  #btn-play { flex: 2; background: var(--accent); color: #fff; border-color: var(--accent); }
  #btn-play:hover { background: #1f5440; border-color: #1f5440; }
  #btn-pause { flex: 1; }
  #btn-stop { padding: 11px 18px; }

  .btn-icon { font-size: 17px; }

  /* Status */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-text { font-size: 13px; color: var(--text-sub); }

  .note {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 10px;
    line-height: 1.6;
  }

  .btn-clear {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-sub);
  }

  .btn-clear:hover { background: var(--bg); }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>テキスト読み上げ</h1>
    <span>Text to Speech</span>
  </header>

  <!-- テキスト入力 -->
  <div class="card">
    <div class="card-label">
      <span>テキストを入力</span>
      <button class="btn-clear" onclick="clearAll()">クリア</button>
    </div>
    <textarea id="tts-input" oninput="onTextInput()" placeholder="ここにテキストを貼り付けてください..."></textarea>
    <div class="char-count"><span id="char-count">0</span> 文字</div>
  </div>

  <!-- プレビュー -->
  <div class="card" id="preview-panel" style="display:none;">
    <div class="card-label">
      <span>読み上げプレビュー</span>
      <span id="seg-info" style="font-weight:400;"></span>
    </div>
    <div id="preview-box"></div>
    <p class="note">文をクリックするとその位置から読み上げます</p>
  </div>

  <!-- 再生位置 -->
  <div class="card" id="pos-panel" style="display:none;">
    <div class="card-label"><span>再生位置</span></div>
    <div class="slider-row">
      <input type="range" id="pos-slider" min="0" max="0" value="0" step="1" oninput="onSliderChange(this.value)">
      <span class="pos-label" id="pos-label">文 1 / 1</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-hint);">
      <span>先頭</span><span>末尾</span>
    </div>
  </div>

  <!-- 音声設定 -->
  <div class="card">
    <div class="card-label"><span>音声設定</span></div>
    <div class="settings-grid">
      <div class="field">
        <label>声の種類</label>
        <select id="voice-select"></select>
      </div>
      <div class="field">
        <label>言語</label>
        <select id="lang-select" onchange="filterVoices()">
          <option value="ja">日本語</option>
          <option value="en">英語</option>
          <option value="zh">中国語</option>
          <option value="ko">韓国語</option>
          <option value="">すべて</option>
        </select>
      </div>
    </div>
    <div class="settings-grid-3">
      <div class="field">
        <label>速度 <span id="rate-val">1.0</span>×</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0"
          oninput="document.getElementById('rate-val').textContent=parseFloat(this.value).toFixed(1)">
      </div>
      <div class="field">
        <label>音程 <span id="pitch-val">1.0</span></label>
        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.0"
          oninput="document.getElementById('pitch-val').textContent=parseFloat(this.value).toFixed(1)">
      </div>
      <div class="field">
        <label>音量 <span id="vol-val">100</span>%</label>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1"
          oninput="document.getElementById('vol-val').textContent=Math.round(this.value*100)">
      </div>
    </div>
  </div>

  <!-- コントロール -->
  <div class="btn-row">
    <button id="btn-play" onclick="startSpeech()">
      <span class="btn-icon">▶</span> 読み上げ開始
    </button>
    <button id="btn-pause" onclick="togglePause()" disabled>
      <span class="btn-icon" id="pause-icon">⏸</span>
      <span id="pause-label">一時停止</span>
    </button>
    <button id="btn-stop" onclick="stopSpeech()" disabled>
      <span class="btn-icon">⏹</span>
    </button>
  </div>

  <!-- ステータス -->
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">待機中</span>
  </div>

</div>

<script>
let voices = [];
let segments = [];
let currentIdx = 0;
let paused = false;
let playing = false;

function splitSegments(text) {
  if (typeof Intl !== 'undefined' && Intl.Segmenter) {
    try {
      const lang = document.getElementById('lang-select').value || 'ja';
      const seg = new Intl.Segmenter(lang, { granularity: 'sentence' });
      const result = Array.from(seg.segment(text), s => s.segment.trim()).filter(s => s.length > 0);
      if (result.length > 0) return result;
    } catch(e) {}
  }
  const raw = text.match(/[^。！？\n\.!?]+[。！？\n\.!?]?/g) || [];
  return raw.map(s => s.trim()).filter(s => s.length > 0);
}

function onTextInput() {
  const text = document.getElementById('tts-input').value;
  document.getElementById('char-count').textContent = text.length;
  segments = splitSegments(text);
  currentIdx = 0;
  renderPreview();
  updateSlider();
  const show = segments.length > 0;
  document.getElementById('preview-panel').style.display = show ? 'block' : 'none';
  document.getElementById('pos-panel').style.display = show ? 'block' : 'none';
  document.getElementById('seg-info').textContent = segments.length + '文に分割';
}

function renderPreview() {
  const box = document.getElementById('preview-box');
  if (segments.length === 0) { box.textContent = ''; return; }
  box.innerHTML = segments.map((s, i) => {
    let cls = 'seg';
    if (i < currentIdx) cls += ' played';
    if (i === currentIdx) cls += ' current';
    return `<span class="${cls}" onclick="jumpTo(${i})">${s.replace(/</g,'&lt;')}</span>`;
  }).join('');
}

function jumpTo(i) {
  currentIdx = i;
  updateSlider();
  renderPreview();
  if (playing) { speechSynthesis.cancel(); speakFrom(currentIdx); }
}

function updateSlider() {
  const sl = document.getElementById('pos-slider');
  sl.max = Math.max(0, segments.length - 1);
  sl.value = currentIdx;
  document.getElementById('pos-label').textContent = `文 ${currentIdx + 1} / ${Math.max(1, segments.length)}`;
}

function onSliderChange(val) {
  currentIdx = parseInt(val);
  document.getElementById('pos-label').textContent = `文 ${currentIdx + 1} / ${segments.length}`;
  renderPreview();
  if (playing) { speechSynthesis.cancel(); speakFrom(currentIdx); }
}

function getVoice() {
  const idx = document.getElementById('voice-select').value;
  return (idx !== '' && voices[parseInt(idx)]) ? voices[parseInt(idx)] : null;
}

function speakFrom(startIdx) {
  if (startIdx >= segments.length) {
    setStatus('完了', '#2a6b50');
    setButtonState(false);
    playing = false;
    return;
  }
  currentIdx = startIdx;
  renderPreview();
  updateSlider();

  const utter = new SpeechSynthesisUtterance(segments[startIdx]);
  const v = getVoice();
  if (v) utter.voice = v;
  utter.rate = parseFloat(document.getElementById('rate').value);
  utter.pitch = parseFloat(document.getElementById('pitch').value);
  utter.volume = parseFloat(document.getElementById('volume').value);
  utter.onend = () => { if (!playing) return; speakFrom(startIdx + 1); };
  utter.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    setStatus('エラー: ' + e.error, '#b05e10');
    setButtonState(false);
    playing = false;
  };
  speechSynthesis.speak(utter);
}

function startSpeech() {
  if (segments.length === 0) { setStatus('テキストを入力してください', '#b05e10'); return; }
  speechSynthesis.cancel();
  paused = false;
  playing = true;
  setButtonState(true);
  setStatus('読み上げ中...', '#2a6b50');
  speakFrom(currentIdx);
}

function togglePause() {
  if (!speechSynthesis.speaking && !paused) return;
  if (paused) {
    speechSynthesis.resume();
    paused = false;
    setStatus('読み上げ中...', '#2a6b50');
  } else {
    speechSynthesis.pause();
    paused = true;
    setStatus('一時停止中', '#b05e10');
  }
  document.getElementById('pause-icon').textContent = paused ? '▶' : '⏸';
  document.getElementById('pause-label').textContent = paused ? '再開' : '一時停止';
}

function stopSpeech() {
  playing = false;
  paused = false;
  speechSynthesis.cancel();
  setStatus('停止しました', '#a09d97');
  setButtonState(false);
  document.getElementById('pause-icon').textContent = '⏸';
  document.getElementById('pause-label').textContent = '一時停止';
}

function clearAll() {
  stopSpeech();
  document.getElementById('tts-input').value = '';
  segments = [];
  currentIdx = 0;
  document.getElementById('char-count').textContent = '0';
  document.getElementById('preview-box').innerHTML = '';
  document.getElementById('preview-panel').style.display = 'none';
  document.getElementById('pos-panel').style.display = 'none';
}

function setStatus(text, color) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = color;
}

function setButtonState(active) {
  ['btn-pause', 'btn-stop'].forEach(id => {
    const el = document.getElementById(id);
    el.disabled = !active;
  });
}

function loadVoices() {
  voices = speechSynthesis.getVoices();
  filterVoices();
}

function filterVoices() {
  const lang = document.getElementById('lang-select').value;
  const sel = document.getElementById('voice-select');
  const filtered = lang ? voices.filter(v => v.lang.startsWith(lang)) : voices;
  sel.innerHTML = '';
  if (filtered.length === 0) {
    sel.innerHTML = '<option value="">利用可能な声がありません</option>';
    return;
  }
  filtered.forEach(v => {
    const opt = document.createElement('option');
    opt.value = voices.indexOf(v);
    opt.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(opt);
  });
}

if (typeof speechSynthesis !== 'undefined') {
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 500);
} else {
  document.getElementById('status-text').textContent = 'このブラウザは音声合成に対応していません';
}
</script>
</body>
</html>
